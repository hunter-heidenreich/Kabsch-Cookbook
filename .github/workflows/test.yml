name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  test-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82  # v7.5.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # MLX has sys_platform == 'darwin' in pyproject.toml, so it is
        # skipped automatically on Linux -- no extra flag needed.
        run: uv sync --dev

      - name: Lint with Ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Test with pytest
        run: uv run pytest --junit-xml=pytest-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: test-results-linux-${{ matrix.python-version }}
          path: |
            pytest-results.xml
            coverage.xml

  test-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82  # v7.5.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # MLX has sys_platform == 'darwin' in pyproject.toml, so it is
        # installed here and MLX tests run on this runner.
        run: uv sync --dev

      - name: Test with pytest
        run: uv run pytest --junit-xml=pytest-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: test-results-macos-${{ matrix.python-version }}
          path: |
            pytest-results.xml
            coverage.xml
