name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  test-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # MLX has sys_platform == 'darwin' in pyproject.toml, so it is
        # skipped automatically on Linux -- no extra flag needed.
        run: uv sync --dev

      - name: Lint with Ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Test with pytest
        run: uv run pytest --junit-xml=pytest-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: test-results-linux-${{ matrix.python-version }}
          path: |
            pytest-results.xml
            coverage.xml

  test-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # MLX has sys_platform == 'darwin' in pyproject.toml, so it is
        # installed here and MLX tests run on this runner.
        run: uv sync --dev

      - name: Test with pytest
        run: uv run pytest --junit-xml=pytest-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: test-results-macos-${{ matrix.python-version }}
          path: |
            pytest-results.xml
            coverage.xml
